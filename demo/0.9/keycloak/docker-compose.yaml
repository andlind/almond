version: "3.9"

services:
  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    command: start-dev --import-realm
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin

      KC_HOSTNAME: localhost 
      KC_HOSTNAME_PORT: 8089
      KC_HOSTNAME_STRICT: "false"
      KC_PROXY: edge

    ports:
      - "8089:8080"
    volumes:
      - ./almondmonitor-realm.json:/opt/keycloak/data/import/keycloak-realm.json
    networks:
      - almond-demo

networks:
  almond-demo:
    driver: bridge

