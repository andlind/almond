apiVersion: v1
kind: Service
metadata:
  name: nginx-service
spec:
  type: NodePort
  selector:
    app: nginx-almond
  ports:
    - name: http
      port: 80
      targetPort: 80
      nodePort: 30800

---
apiVersion: v1
kind: Service
metadata:
  name: howru-api
spec:
  type: NodePort
  selector:
    app: nginx-almond
  ports:
    - name: howru-api
      port: 8085
      targetPort: 8085
      nodePort: 30885

---
apiVersion: v1
kind: Service
metadata:
  name: almond-api
spec:
  type: NodePort
  selector:
    app: nginx-almond
  ports:
    - name: almond-api
      port: 9090
      targetPort: 9090
      nodePort: 30985
