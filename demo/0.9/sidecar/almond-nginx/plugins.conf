# [service_name] description; plugin args;active;interval
[check_ping] Its alive;check_icmp -H 127.0.0.1 -w 100,20% -c 500,60%;1;1
[check_load] Check load;check_load -w 70 -c 90;1;2
[check_root] Check /;check_disk -w 10% -c 5% -p /;1;5
[check_var_log] Check /var/log;check_disk -w 10% -c 5% -p /var/log;1;5
[check_users] Check users;check_users -w 75 -c 100;1;5
[check_uptime] Check uptime;check_uptime.sh 30 60;1;60
[check_cpu_stats] CPU Statistics;check_cpu_stats.sh -w 95,95,60 -c 100,100,100 -i 1 -n 3;1;2
[check_memory] Check memory usage;check_memory.py -w 15 -c 10;1;2
[check_almond] Check Almond process;check_process -C almond -c 1:5;1;2
[check_howru] Check HowRU API;check_http -H 127.0.0.1 -p 8085 -u /api/status;1;2
[check_nginx] Check nginx;check_http -H 127.0.0.1 -p 80;1;1
[check_nginx_status] Check nginx stub status;check_http -H localhost -p 80 -u /nginx_status -w 3 -c 6;1;1
[check_nginx_log_error] Check nginx log errors;check_log -F /var/log/nginx/error.log -O /var/log/nginx/error.log.old -q error;1;1
[check_nginx_active] Check nginx active;check_nginx.sh active 50 100;1;1
[check_nginx_access_log] Check nginx access log;check_nginx.sh access_log 1 2;1;2
[check_nginx_reading] Check nginx reading;check_nginx.sh status reading 5 10;1;1
[check_nginx_writing] Check nginx writing;check_nginx.sh status writing 5 10;1;1
[check_nginx_waiting] Check nginx waiting;check_nginx.sh status waiting 20 50;1;1
